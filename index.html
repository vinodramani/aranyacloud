<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AranyaCloud</title>
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg:        #080810;
    --bg2:       #0e0e1a;
    --bg3:       #14142a;
    --border:    rgba(100,100,200,0.18);
    --accent:    #6c63ff;
    --accent2:   #00d4ff;
    --glow:      rgba(108,99,255,0.35);
    --glow2:     rgba(0,212,255,0.25);
    --text:      #d0d0f0;
    --text-dim:  #5a5a8a;
    --online:    #00e676;
    --offline:   #ff5252;
    --warn:      #ffab40;
    --radius:    12px;
    --font:      'Rajdhani', sans-serif;
    --mono:      'Share Tech Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 12s ease-in-out infinite;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0,0); }
    33%       { transform: translate(80px, 60px); }
    66%       { transform: translate(-40px, 100px); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 24px 0 20px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .logo-ring {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    box-shadow: 0 0 12px var(--glow), inset 0 0 8px rgba(108,99,255,0.2);
    animation: ringPulse 3s ease-in-out infinite;
    position: relative;
  }

  .logo-ring::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    opacity: 0.6;
    animation: ringPulse 3s ease-in-out infinite reverse;
  }

  @keyframes ringPulse {
    0%, 100% { box-shadow: 0 0 12px var(--glow), inset 0 0 8px rgba(108,99,255,0.2); }
    50%       { box-shadow: 0 0 24px var(--glow), inset 0 0 14px rgba(108,99,255,0.35); }
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    font-family: var(--mono);
    font-size: 12px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.4s;
    flex-shrink: 0;
  }
  .status-dot.online  { background: var(--online);  box-shadow: 0 0 8px var(--online); }
  .status-dot.offline { background: var(--offline); box-shadow: 0 0 8px var(--offline); }
  .status-dot.warn    { background: var(--warn);    box-shadow: 0 0 8px var(--warn); }

  #statusText { color: var(--text-dim); transition: color 0.4s; }

  /* ── Panel card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Connect section ── */
  .connect-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .mac-input-wrap {
    position: relative;
    flex: 1;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    letter-spacing: 1px;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }

  input[type="text"]:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ── Buttons ── */
  .btn {
    font-family: var(--font);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 10px 16px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
    pointer-events: none;
  }

  .btn:active { transform: translateY(1px); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #4a3fd4);
    color: #fff;
    box-shadow: 0 4px 14px rgba(108,99,255,0.4);
  }
  .btn-primary:hover { box-shadow: 0 4px 20px rgba(108,99,255,0.6); }

  .btn-danger {
    background: linear-gradient(135deg, #e53935, #b71c1c);
    color: #fff;
    box-shadow: 0 4px 14px rgba(229,57,53,0.35);
  }

  .btn-ghost {
    background: var(--bg3);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

  .btn-sm { padding: 7px 12px; font-size: 11px; }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ── Brightness ── */
  .brightness-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .bri-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    width: 28px;
    text-align: right;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
    position: relative;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--glow2);
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 14px var(--glow2);
  }

  .bri-presets {
    display: flex;
    gap: 6px;
  }

  /* ── Color grid ── */
  .color-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .color-btn {
    height: 44px;
    border-radius: 8px;
    border: 1.5px solid transparent;
    cursor: pointer;
    font-family: var(--font);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .color-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: rgba(255,255,255,0.12);
    border-radius: 6px 6px 0 0;
  }

  .color-btn:active { transform: scale(0.96); }
  .color-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

  /* ── Effects grid ── */
  .effect-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .effect-btn {
    height: 44px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--font);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .effect-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: rgba(255,255,255,0.04);
  }

  .effect-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--text);
    box-shadow: 0 0 12px rgba(108,99,255,0.2);
  }
  .effect-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 12px var(--glow2);
    background: rgba(0,212,255,0.07);
  }
  .effect-btn:active:not(:disabled) { transform: scale(0.96); }
  .effect-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .effect-btn.off-btn {
    border-color: rgba(255,82,82,0.3);
    color: #ff5252;
  }
  .effect-btn.off-btn:hover:not(:disabled) {
    border-color: #ff5252;
    box-shadow: 0 0 12px rgba(255,82,82,0.3);
  }

  /* ── Log line ── */
  #logLine {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 6px;
    min-height: 22px;
    transition: color 0.3s;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    padding-top: 8px;
    opacity: 0.5;
  }

  /* ── Responsive tweaks ── */
  @media (max-width: 360px) {
    .color-grid, .effect-grid { grid-template-columns: repeat(3, 1fr); }
    h1 { font-size: 22px; }
  }

  /* ── Pulse animation for active ring ── */
  @keyframes activePulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }
  .logo-ring.active { animation: activePulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-ring" id="logoRing"></div>
      <h1>AranyaCloud</h1>
    </div>
    <div class="subtitle">NeoPixel Ring Controller</div>
  </header>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not connected</span>
  </div>

  <!-- Connect card -->
  <div class="card">
    <div class="card-title">Connection</div>
    <div class="connect-row">
      <div class="mac-input-wrap">
        <input type="text" id="macInput"
          placeholder="Device MAC (e.g. a1b2c3d4e5f6)"
          maxlength="17"
          autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
      <button class="btn btn-ghost btn-sm" id="btnChange" style="display:none">Change</button>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-primary" id="btnConnect" style="flex:1">Connect</button>
    </div>
    <div id="logLine">—</div>
  </div>

  <!-- Brightness card -->
  <div class="card">
    <div class="card-title">Brightness</div>
    <div class="brightness-row">
      <span class="bri-label" id="briVal">50</span>
      <input type="range" id="seekBrightness" min="0" max="255" value="50" disabled/>
    </div>
    <div class="bri-presets" style="justify-content:flex-end;">
      <button class="btn btn-ghost btn-sm bri-preset" data-cmd="dim"    data-bri="30"  disabled>Dim</button>
      <button class="btn btn-ghost btn-sm bri-preset" data-cmd="bright" data-bri="180" disabled>Bright</button>
      <button class="btn btn-ghost btn-sm bri-preset" data-cmd="full"   data-bri="255" disabled>Full</button>
    </div>
  </div>

  <!-- Colors card -->
  <div class="card">
    <div class="card-title">Colors</div>
    <div class="color-grid">
      <button class="color-btn" data-cmd="red"
        style="background:linear-gradient(to bottom,#ff6666,#b71c1c);color:#fff;border-color:#ff8a80" disabled>Red</button>
      <button class="color-btn" data-cmd="green"
        style="background:linear-gradient(to bottom,#66bb6a,#1b5e20);color:#fff;border-color:#a5d6a7" disabled>Green</button>
      <button class="color-btn" data-cmd="blue"
        style="background:linear-gradient(to bottom,#64b5f6,#0d47a1);color:#fff;border-color:#90caf9" disabled>Blue</button>
      <button class="color-btn" data-cmd="white"
        style="background:linear-gradient(to bottom,#ffffff,#bdbdbd);color:#333;border-color:#eee" disabled>White</button>
      <button class="color-btn" data-cmd="orange"
        style="background:linear-gradient(to bottom,#ffb74d,#e65100);color:#fff;border-color:#ffcc80" disabled>Orange</button>
      <button class="color-btn" data-cmd="yellow"
        style="background:linear-gradient(to bottom,#fff176,#f57f17);color:#333;border-color:#fff9c4" disabled>Yellow</button>
      <button class="color-btn" data-cmd="purple"
        style="background:linear-gradient(to bottom,#ce93d8,#4a148c);color:#fff;border-color:#e1bee7" disabled>Purple</button>
      <button class="color-btn" data-cmd="cyan"
        style="background:linear-gradient(to bottom,#4dd0e1,#006064);color:#fff;border-color:#b2ebf2" disabled>Cyan</button>
      <button class="color-btn" data-cmd="pink"
        style="background:linear-gradient(to bottom,#f48fb1,#880e4f);color:#fff;border-color:#fce4ec" disabled>Pink</button>
    </div>
  </div>

  <!-- Effects card -->
  <div class="card">
    <div class="card-title">Effects</div>
    <div class="effect-grid">
      <button class="effect-btn" data-cmd="solid"   disabled>Solid</button>
      <button class="effect-btn" data-cmd="rainbow" disabled>Rainbow</button>
      <button class="effect-btn" data-cmd="spin"    disabled>Spin</button>
      <button class="effect-btn" data-cmd="spin2"   disabled>Spin 2</button>
      <button class="effect-btn" data-cmd="breathe" disabled>Breathe</button>
      <button class="effect-btn" data-cmd="pulse"   disabled>Pulse</button>
      <button class="effect-btn" data-cmd="run"     disabled>Run</button>
      <button class="effect-btn" data-cmd="wipe"    disabled>Wipe</button>
      <button class="effect-btn" data-cmd="theater" disabled>Theater</button>
      <button class="effect-btn" data-cmd="sparkle" disabled>Sparkle</button>
      <button class="effect-btn" data-cmd="meteor"  disabled>Meteor</button>
      <button class="effect-btn off-btn" data-cmd="off" disabled>OFF</button>
    </div>
  </div>

  <footer>AranyaCloud v2.0 &nbsp;·&nbsp; MQTT over WSS</footer>
</div>

<script>
// ── Config ────────────────────────────────────────────
const BROKER_HOST = 'o2f8f1bb.ala.asia-southeast1.emqxsl.com';
const BROKER_PORT = 8084;   // WSS port on EMQX serverless
const BROKER_USER = 'AranyaAdmin';
const BROKER_PASS = '123Smart@';
const STORAGE_KEY = 'aranyacloud_mac';

// ── State ─────────────────────────────────────────────
let mqttClient      = null;
let brokerConnected = false;
let deviceOnline    = false;
let topicCmd        = '';
let topicState      = '';
let topicStatus     = '';

// ── DOM refs ──────────────────────────────────────────
const macInput   = document.getElementById('macInput');
const btnConnect = document.getElementById('btnConnect');
const btnChange  = document.getElementById('btnChange');
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const logLine    = document.getElementById('logLine');
const seekBri    = document.getElementById('seekBrightness');
const briVal     = document.getElementById('briVal');
const logoRing   = document.getElementById('logoRing');

const allControls = document.querySelectorAll(
  '.color-btn, .effect-btn, .bri-preset, #seekBrightness'
);

// ── Restore saved MAC ─────────────────────────────────
const savedMac = localStorage.getItem(STORAGE_KEY) || 'fce8c0a5b350';
if (savedMac) {
  macInput.value    = savedMac;
  macInput.disabled = true;
  btnChange.style.display = 'inline-flex';
}

btnChange.addEventListener('click', () => {
  macInput.disabled = false;
  macInput.focus();
  btnChange.style.display = 'none';
});

// ── Build topics ──────────────────────────────────────
function buildTopics(mac) {
  const m = mac.replace(/:/g,'').toLowerCase();
  topicCmd    = `aranyasmart/${m}/cmd`;
  topicState  = `aranyasmart/${m}/state`;
  topicStatus = `aranyasmart/${m}/status`;
}

// ── Connect ───────────────────────────────────────────
btnConnect.addEventListener('click', () => {
  if (brokerConnected) { disconnect(); return; }

  const mac = macInput.value.trim().replace(/:/g,'').toLowerCase();
  if (mac.length < 12) { setLog('Enter a valid 12-character MAC', 'warn'); return; }

  localStorage.setItem(STORAGE_KEY, mac);
  macInput.disabled = true;
  btnChange.style.display = 'none';
  buildTopics(mac);
  connect(mac);
});

function connect(mac) {
  setStatus('Connecting to broker…', 'warn');
  btnConnect.textContent = 'Connecting…';
  btnConnect.disabled    = true;

  const clientId = 'aranyacloud-web-' + Math.random().toString(36).slice(2, 9);
  const url = `wss://${BROKER_HOST}:${BROKER_PORT}/mqtt`;
  console.log('MQTT connecting to:', url);
  setLog('Connecting to broker…');

  mqttClient = mqtt.connect(url, {
    clientId,
    username:     BROKER_USER,
    password:     BROKER_PASS,
    keepalive:    60,
    reconnectPeriod: 0,   // manual reconnect only
    connectTimeout: 10000,
  });

  mqttClient.on('connect', () => {
    brokerConnected = true;
    btnConnect.textContent = 'Disconnect';
    btnConnect.disabled    = false;
    btnChange.style.display = 'none';
    setLog('Broker connected — waiting for device…', 'warn');

    mqttClient.subscribe([topicStatus, topicState], { qos: 1 });
  });

  mqttClient.on('message', (topic, payload) => {
    const msg = payload.toString().trim();
    if (topic === topicStatus) {
      deviceOnline = msg === 'online';
      if (deviceOnline) {
        setStatus('Device online', 'online');
        enableControls(true);
        logoRing.classList.add('active');
        setLog('Ready');
      } else {
        setStatus('Device offline', 'offline');
        enableControls(false);
        logoRing.classList.remove('active');
        setLog('Device is offline');
      }
    } else if (topic === topicState) {
      const briMatch = msg.match(/"brightness"\s*:\s*(\d+)/);
      if (briMatch) {
        const b = parseInt(briMatch[1]);
        seekBri.value    = b;
        briVal.textContent = b;
      }
      const effMatch = msg.match(/"effect"\s*:\s*"([^"]+)"/);
      if (effMatch) highlightEffect(effMatch[1]);
    }
  });

  mqttClient.on('error', (err) => {
    setLog('Error: ' + (err.message || err), 'warn');
    console.error('MQTT error:', err);
  });

  mqttClient.on('reconnect', () => {
    setLog('Retrying connection…', 'warn');
  });

  mqttClient.on('close', () => {
    brokerConnected = false;
    deviceOnline    = false;
    enableControls(false);
    logoRing.classList.remove('active');
    setStatus('Disconnected', 'offline');
    btnConnect.textContent = 'Connect';
    btnConnect.disabled    = false;
    btnChange.style.display = 'inline-flex';
    macInput.disabled = true;
    setLog('Disconnected');
    clearActiveEffect();
  });
}

function disconnect() {
  if (mqttClient) { mqttClient.end(true); mqttClient = null; }
}

// ── Publish ───────────────────────────────────────────
function publish(cmd) {
  if (!mqttClient || !brokerConnected) return;
  mqttClient.publish(topicCmd, cmd, { qos: 1 });
  setLog('Sent: ' + cmd);
}

// ── Brightness seekbar ────────────────────────────────
seekBri.addEventListener('input', () => {
  briVal.textContent = seekBri.value;
});
seekBri.addEventListener('change', () => {
  publish('b,' + seekBri.value);
});

// ── Brightness presets ────────────────────────────────
document.querySelectorAll('.bri-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    const bri = parseInt(btn.dataset.bri);
    seekBri.value = bri;
    briVal.textContent = bri;
    publish(btn.dataset.cmd);
  });
});

// ── Color buttons ─────────────────────────────────────
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    publish(btn.dataset.cmd);
    clearActiveEffect();
  });
});

// ── Effect buttons ────────────────────────────────────
document.querySelectorAll('.effect-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    publish(btn.dataset.cmd);
    if (btn.dataset.cmd !== 'off') highlightEffect(btn.dataset.cmd);
    else clearActiveEffect();
  });
});

function highlightEffect(eff) {
  document.querySelectorAll('.effect-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cmd === eff);
  });
}

function clearActiveEffect() {
  document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
}

// ── Enable / disable controls ─────────────────────────
function enableControls(on) {
  allControls.forEach(el => el.disabled = !on);
}

// ── Status helpers ────────────────────────────────────
function setStatus(msg, state) {
  statusText.textContent = msg;
  statusDot.className    = 'status-dot ' + (state || '');
  statusText.style.color = state === 'online'  ? 'var(--online)'  :
                           state === 'offline' ? 'var(--offline)' :
                           state === 'warn'    ? 'var(--warn)'    : 'var(--text-dim)';
}

function setLog(msg) {
  logLine.textContent = msg;
}
</script>
</body>
</html>
